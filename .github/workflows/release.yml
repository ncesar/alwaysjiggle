name: Release on version bump

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: current
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Get previous version
        id: previous
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version // empty' || echo "")
          echo "version=$PREV" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.current.outputs.version != steps.previous.outputs.version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.current.outputs.version != steps.previous.outputs.version
        run: npm ci

      - name: Build DMG
        if: steps.current.outputs.version != steps.previous.outputs.version
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip code signing

      - name: Create release and attach DMG
        if: steps.current.outputs.version != steps.previous.outputs.version
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          gh release create "v${{ steps.current.outputs.version }}" \
            --title "v${{ steps.current.outputs.version }}" \
            --generate-notes \
            "$DMG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
